name: deploy
on:
  push:
    branches: ["main"]
permissions: {}
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: execute remote ssh & deploy frontend server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          # 서버 authorized_keys 의 forced-command 가 /usr/local/bin/deploy-trigger 를 실행한다.
          # 아래 script 는 서버에서 무시되고 $SSH_ORIGINAL_COMMAND 로 로깅만 된다(최소 유지).
          script: |
            echo "deploy: trigger-blog -> server forced-command (deploy-trigger)"
