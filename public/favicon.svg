<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Trigger Blog favicon</title>
  <desc id="desc">A compact Trigger blog mark with a code-inspired Tr monogram and trigger signal.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="48" x2="424" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="trigger" x1="132" y1="122" x2="402" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
